name: cli-site-workflow

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Verify
        working-directory: ./site
        run: |
          npm ci
          # Verify key packages are actually installed
          echo "=== Checking node_modules ==="
          ls node_modules/react-router-dom/dist/index.js && echo "✓ react-router-dom" || echo "✗ react-router-dom MISSING"
          ls node_modules/react/index.js && echo "✓ react" || echo "✗ react MISSING"
          ls node_modules/@types/react/index.d.ts && echo "✓ @types/react" || echo "✗ @types/react MISSING"

      - name: Build
        working-directory: ./site
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/dist  # 构建输出目录
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
