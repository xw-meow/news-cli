name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Read package version
        id: pkg
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if already released
        id: check
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "already_released=true" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists. Skipping publish."
          else
            echo "already_released=false" >> "$GITHUB_OUTPUT"
            echo "New version detected: $tag"
          fi

      - name: Install dependencies
        if: steps.check.outputs.already_released == 'false'
        run: npm ci

      - name: Verify
        if: steps.check.outputs.already_released == 'false'
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: Build
        if: steps.check.outputs.already_released == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.check.outputs.already_released == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        if: steps.check.outputs.already_released == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.pkg.outputs.version }}" -m "Release v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"
